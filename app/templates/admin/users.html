{% extends "base.html" %}

{% block title %}User Management{% endblock %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="fw-bold mb-0">Users</h2>
    <a href="{{ url_for('auth.admin_create_user') }}" class="btn btn-primary shadow-sm">
        + Create User
    </a>
</div>

<div class="card shadow-sm">
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    {% for u in users %}
                    <tr>
                        <td>{{ u.id }}</td>
                        <td class="fw-semibold">{{ u.username }}</td>
                        <td>{{ u.email }}</td>
                        <td>
                            {% if u.role == "admin" %}
                                <span class="badge bg-dark">Admin</span>
                            {% else %}
                                <span class="badge bg-secondary">User</span>
                            {% endif %}
                        </td>
                        <td class="text-end">
                            <a href="{{ url_for('auth.admin_edit_user', id=u.id) }}" class="btn btn-sm btn-outline-primary">
                                Edit
                            </a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

{% endblock %}
