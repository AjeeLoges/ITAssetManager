{% extends "base.html" %}

{% block title %}Profile{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-lg-8 col-xl-7">

        <div class="card shadow-sm">
            <div class="card-body p-4">

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h3 class="fw-bold mb-1">Profile</h3>
                        <p class="text-muted mb-0">Manage your account settings</p>
                    </div>
                </div>

                <div class="row g-4">
                    <div class="col-md-6">
                        <div class="p-3 bg-light rounded-3">
                            <div class="text-muted small">Username</div>
                            <div class="fw-semibold fs-5">{{ user.username }}</div>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="p-3 bg-light rounded-3">
                            <div class="text-muted small">Email</div>
                            <div class="fw-semibold fs-5">{{ user.email }}</div>
                        </div>
                    </div>
                </div>

                <hr class="my-4">

                <div class="d-flex flex-wrap gap-2">
                    <a href="{{ url_for('auth.edit_profile') }}" class="btn btn-primary">
                        Edit Profile
                    </a>

                    <a href="{{ url_for('auth.change_password') }}" class="btn btn-outline-dark">
                        Change Password
                    </a>

                    <a href="{{ url_for('assets.dashboard') }}" class="btn btn-outline-secondary">
                        Back
                    </a>
                </div>

            </div>
        </div>

    </div>
</div>

{% endblock %}
